- name: Install Useful Fonts
  become: true
  package:
    name:
      [
        "awesome-terminal-fonts",
        "noto-fonts",
        "noto-fonts-cjk",
        "noto-fonts-emoji",
        "noto-fonts-extra",
        "otf-font-awesome",
        "ttf-fira-code",
        "ttf-firacode-nerd",
        "ttf-font-awesome",
        "ttf-hack",
        "ttf-jetbrains-mono", 
        "ttf-jetbrains-mono-nerd",
      ]
  tags:
    - install
    - ui
    - core

- name: Install icons and themes and other related tools
  become: true
  package:
    name:
      [
        "lxappearance",
        "kvantum",
        "kvantum-theme-materia",
        "materia-gtk-theme",
        "materia-kde",
        "papirus-icon-theme",
      ]
  tags:
    - install
    - ui
    - core
