- name: Install System Packages 2 (lua, unzip, libtool,  gettext)
  become: true
  package:
    name:
      [
        "base-devel",
        "amd-ucode",
        "tmux",
        "neovim",
        "stow",
        "ripgrep",
        "fzf",
        "ntfs-3g",
        "iwd",
        "git",
        "curl",
        "wget",
        "man",
        "tldr",
        "lua",
        "jq",
        "thefuck",
        "zip",
        "unzip",
        "libtool",
        "gettext",
        "xdg-user-dirs",
        "xorg-xwayland",
        "qt5-wayland",
        "networkmanager",
        "blueman"
      ]
  tags:
    - install
    - core

- name: Install Hyprland and required packages
  become: true
  package:
    name:
      [
        "hyprland",
        "hyprpaper",
        "xdg-desktop-portal-hyprland",
        "kitty",
        "alacritty",
        "waybar",
        "pamixer",
        "wofi",
        "brightnessctl",
        "wl-clipboard",
        "slurp",
        "grim",
        "zathura",
        "zathura-cb",
        "zathura-djvu",
        "zathura-pdf-poppler",
        "screenkey",
        "network-manager-applet",
        "polkit-gnome",
        "nautilus",
        "firefox"
      ]
  tags:
    - install
    - core

